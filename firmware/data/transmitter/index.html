<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>OpenDriveHub Transmitter</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      font-family: -apple-system, sans-serif;
      max-width: 560px;
      margin: 2em auto;
      padding: 0 1em;
      background: #0d1117;
      color: #e6edf3
    }

    h1 {
      font-size: 1.3em;
      color: #1f6feb;
      margin-bottom: .8em
    }

    h2 {
      font-size: 1em;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin: 1.4em 0 .4em
    }

    .status {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: .7em 1em;
      font-size: .85em;
      margin-bottom: 1em;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .3em .8em
    }

    .status span {
      color: #8b949e
    }

    .status strong {
      color: #e6edf3
    }

    label {
      display: block;
      margin: .5em 0 .15em;
      font-size: .9em;
      color: #8b949e
    }

    input,
    select {
      width: 100%;
      padding: .45em .6em;
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 4px;
      font-size: .95em
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #1f6feb
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: .4em
    }

    th {
      text-align: left;
      font-size: .85em;
      color: #8b949e;
      font-weight: normal;
      padding: .3em .4em;
      border-bottom: 1px solid #21262d
    }

    td {
      padding: .3em .4em
    }

    td select {
      width: auto;
      min-width: 8em
    }

    td input[type=number] {
      width: 5em
    }

    .btn {
      margin-top: 1.2em;
      padding: .55em 1.4em;
      background: #1f6feb;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: .95em;
      display: inline-block
    }

    .btn:hover {
      background: #388bfd
    }

    .btn-danger {
      background: #f85149
    }

    .btn-danger:hover {
      background: #da3633
    }

    .saved {
      background: #1f4c2e;
      border: 1px solid #3fb950;
      color: #3fb950;
      border-radius: 4px;
      padding: .5em .8em;
      margin-bottom: 1em;
      font-size: .9em;
      display: none
    }

    .imap {
      display: none
    }
  </style>
</head>

<body>
  <h1>&#x1F4E1; OpenDriveHub Transmitter</h1>
  <div id="msg" class="saved"></div>

  <div id="status" class="status">
    <span>Link</span><strong id="s-link">---</strong>
    <span>TX Battery</span><strong id="s-txbatt">---</strong>
    <span>RX Battery</span><strong id="s-rxbatt">---</strong>
    <span>RSSI</span><strong id="s-rssi">---</strong>
  </div>

  <h2>Device</h2>
  <label>Device Name</label>
  <input type="text" id="c-devname" maxlength="28">

  <h2>Radio</h2>
  <label>WiFi Channel (1–13)</label>
  <input type="number" id="c-radioch" min="1" max="13">

  <h2>Battery</h2>
  <label>TX Cells</label>
  <select id="c-txcells">
    <option value="0">Auto</option>
    <option value="1">1S</option>
    <option value="2">2S</option>
    <option value="3">3S</option>
    <option value="4">4S</option>
  </select>
  <label>RX Cells</label>
  <select id="c-rxcells">
    <option value="0">Auto</option>
    <option value="1">1S</option>
    <option value="2">2S</option>
    <option value="3">3S</option>
    <option value="4">4S</option>
  </select>

  <h2>Vehicle Model</h2>
  <select id="c-model" onchange="showMap()"></select>

  <h2>Function → Input Mapping</h2>
  <div id="imaps"></div>

  <div style="margin-top:1.2em">
    <button class="btn" onclick="saveConfig()">Save Settings</button>
    <button class="btn btn-danger" style="margin-left:.5em" onclick="resetConfig()">Factory Reset</button>
  </div>

  <h2>Modules</h2>
  <div id="modules" style="font-size:.85em;color:#8b949e"></div>

  <script>
    const API = '';
    let configData = null;

    async function fetchJson(url) { return (await fetch(API + url)).json(); }
    async function postJson(url, body) {
      return fetch(API + url, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }
    function showMsg(t) {
      const m = document.getElementById('msg');
      m.textContent = t; m.style.display = 'block';
      setTimeout(() => m.style.display = 'none', 3000);
    }

    const moduleTypeNames = { 0: '—', 1: 'Switch', 2: 'Button', 3: 'Pot', 4: 'Encoder' };

    async function loadStatus() {
      try {
        const s = await fetchJson('/api/status');
        document.getElementById('s-link').textContent = s.link?.state || '---';
        document.getElementById('s-txbatt').textContent =
          s.battery?.tx?.voltage_mv ? (s.battery.tx.voltage_mv / 1000).toFixed(1) + ' V' : '---';
        document.getElementById('s-rxbatt').textContent =
          s.battery?.rx?.voltage_mv ? (s.battery.rx.voltage_mv / 1000).toFixed(1) + ' V' : '---';
        document.getElementById('s-rssi').textContent =
          s.link?.rssi != null ? s.link.rssi + ' dBm' : '---';

        // Modules
        if (s.modules) {
          let html = '';
          s.modules.forEach(m => {
            const tn = moduleTypeNames[m.type] || '?';
            html += `<div>Slot ${m.slot}: ${tn} (${m.input_count} inputs)</div>`;
          });
          document.getElementById('modules').innerHTML = html || 'No modules detected';
        }
      } catch (e) { console.error(e); }
    }

    async function loadConfig() {
      try {
        configData = await fetchJson('/api/config');
        const c = configData;
        document.getElementById('c-devname').value = c.device_name || '';
        document.getElementById('c-radioch').value = c.radio_channel || 1;
        document.getElementById('c-txcells').value = c.tx_cells || 0;
        document.getElementById('c-rxcells').value = c.rx_cells || 0;

        // Model selector
        const msel = document.getElementById('c-model');
        msel.innerHTML = '';
        (c.available_models || []).forEach(m => {
          const o = document.createElement('option');
          o.value = m.id; o.textContent = m.name;
          if (m.id === c.model_type) o.selected = true;
          msel.appendChild(o);
        });

        // Input maps for ALL models
        const imapsDiv = document.getElementById('imaps');
        imapsDiv.innerHTML = '';
        const maps = c.input_maps || {};
        const modules = c.modules || [];

        for (const [mk, entries] of Object.entries(maps)) {
          const div = document.createElement('div');
          div.className = 'imap';
          div.id = 'imap_' + mk;
          if (parseInt(mk) === c.model_type) div.style.display = 'block';

          let html = '<table><tr><th>Function</th><th>Input</th><th>Trim</th></tr>';
          entries.forEach((e, i) => {
            html += `<tr><td>${e.function_name || e.function}</td>`;
            html += `<td><select id="in_${mk}_${i}">`;
            html += `<option value="255_0" ${e.slot === 255 ? 'selected' : ''}>None</option>`;
            modules.forEach(m => {
              for (let j = 0; j < m.input_count; j++) {
                const sel = (e.slot === m.slot && e.input_index === j) ? ' selected' : '';
                const tn = moduleTypeNames[m.type] || '?';
                html += `<option value="${m.slot}_${j}"${sel}>Slot${m.slot} ${tn}[${j}]</option>`;
              }
            });
            html += `</select></td>`;
            html += `<td><input type="number" id="tr_${mk}_${i}" min="-100" max="100" value="${e.trim || 0}"></td></tr>`;
          });
          html += '</table>';
          div.innerHTML = html;
          imapsDiv.appendChild(div);
        }
      } catch (e) { console.error(e); }
    }

    function showMap() {
      document.querySelectorAll('.imap').forEach(d => d.style.display = 'none');
      const v = document.getElementById('c-model').value;
      const d = document.getElementById('imap_' + v);
      if (d) d.style.display = 'block';
    }

    async function saveConfig() {
      const maps = {};
      if (configData && configData.input_maps) {
        for (const [mk, entries] of Object.entries(configData.input_maps)) {
          maps[mk] = entries.map((e, i) => {
            const sel = document.getElementById(`in_${mk}_${i}`);
            const trimEl = document.getElementById(`tr_${mk}_${i}`);
            let slot = 255, idx = 0;
            if (sel) {
              const parts = sel.value.split('_');
              slot = parseInt(parts[0]); idx = parseInt(parts[1]);
            }
            return {
              function: e.function,
              slot: slot,
              input_index: idx,
              trim: trimEl ? parseInt(trimEl.value) || 0 : 0
            };
          });
        }
      }

      const body = {
        device_name: document.getElementById('c-devname').value,
        radio_channel: parseInt(document.getElementById('c-radioch').value),
        model_type: parseInt(document.getElementById('c-model').value),
        tx_cells: parseInt(document.getElementById('c-txcells').value),
        rx_cells: parseInt(document.getElementById('c-rxcells').value),
        input_maps: maps
      };

      const r = await postJson('/api/config', body);
      if (r.ok) showMsg('Settings saved');
      else showMsg('Save failed');
    }

    async function resetConfig() {
      if (!confirm('Reset all settings to factory defaults?')) return;
      const r = await postJson('/api/config/reset', {});
      if (r.ok) { showMsg('Reset – rebooting...'); setTimeout(() => location.reload(), 3000); }
    }

    loadConfig();
    loadStatus();
    setInterval(loadStatus, 2000);
  </script>
</body>

</html>
