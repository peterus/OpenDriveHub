; ═══════════════════════════════════════════════════════════════════════
; OpenDriveHub – Unified PlatformIO Build Configuration
;
; Environments:
;   receiver      – ESP32 receiver firmware
;   transmitter   – ESP32 transmitter firmware
;   native        – Host unit tests (no hardware)
;   sim_rx        – Linux receiver simulation (terminal)
;   sim_tx        – Linux transmitter simulation (SDL2 display)
; ═══════════════════════════════════════════════════════════════════════

[platformio]
default_envs = receiver, transmitter
src_dir  = src
lib_dir  = lib
test_dir = test

; ── Shared ESP32 settings ────────────────────────────────────────────────
[esp32_base]
platform       = espressif32
board          = esp32dev
framework      = arduino
monitor_speed  = 115200
upload_speed   = 921600

build_flags =
    -std=gnu++2a
    -Wall
    -Wextra
    -Werror
    ; ESP-IDF framework headers (gpio_ll.h, soc_memory_types.h) have unused params
    ; in inline functions – cannot fix, must relax for ESP32 builds.
    -Wno-error=unused-parameter
    ; Third-party libraries (TFT_eSPI, etc.) trigger these.
    -Wno-error=missing-field-initializers
    -Wno-error=unused-variable
    -DCORE_DEBUG_LEVEL=3

build_unflags = -std=gnu++11

; ── Receiver ─────────────────────────────────────────────────────────────
[env:receiver]
extends = esp32_base
build_src_filter = +<receiver/>

lib_deps =
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    ${esp32_base.build_flags}
    -DODH_RECEIVER

board_build.filesystem = littlefs

; ── Transmitter ──────────────────────────────────────────────────────────
[env:transmitter]
extends = esp32_base
build_src_filter = +<transmitter/>

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    lvgl/lvgl @ ^8.3.11
    adafruit/Adafruit ADS1X15 @ ^2.5.0
    adafruit/Adafruit PCF8574 @ ^1.1.0
    me-no-dev/ESPAsyncWebServer @ ^1.2.3
    bblanchon/ArduinoJson @ ^7.0.0

build_flags =
    ${esp32_base.build_flags}
    -DODH_TRANSMITTER
    -I include
    -DLV_CONF_INCLUDE_SIMPLE
    -DUSER_SETUP_LOADED
    -include include/User_Setup.h

board_build.filesystem = littlefs

; ── Native unit tests ────────────────────────────────────────────────────
[env:native]
platform    = native
build_flags = -std=gnu++20 -Wall -Wextra -Werror -DNATIVE_TEST
build_src_filter = -<*>
test_build_src = no

; ── Simulation: Receiver (terminal, no SDL2) ─────────────────────────────
[env:sim_rx]
platform  = native
extra_scripts = pre:sim/sim_build.py

build_src_filter = +<receiver/>

build_flags =
    -std=gnu++20
    -Wall
    -Wextra
    -Werror
    -DNATIVE_SIM
    -DODH_RECEIVER
    -DSIM_RX
    -lpthread

lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; ── Simulation: Transmitter (SDL2 display) ───────────────────────────────
[env:sim_tx]
platform  = native
extra_scripts = pre:sim/sim_build.py

build_src_filter = +<transmitter/>

build_flags =
    -std=gnu++20
    -Wall
    -Wextra
    -Werror
    ; LVGL has unused parameters in its C code.
    -Wno-error=unused-parameter
    -DNATIVE_SIM
    -DODH_TRANSMITTER
    -DSIM_TX
    -I include
    -DLV_CONF_INCLUDE_SIMPLE
    !pkg-config --cflags sdl2
    !pkg-config --libs sdl2
    -lpthread

; Re-enable strict unused-parameter for our own source code.
build_src_flags =
    -Werror=unused-parameter

lib_deps =
    lvgl/lvgl @ ^8.3.11
    bblanchon/ArduinoJson @ ^7.0.0
